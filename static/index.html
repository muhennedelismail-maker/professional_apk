<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>وكيل Ollama المحلي</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="bg-shape bg-a"></div>
    <div class="bg-shape bg-b"></div>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Local Agent</p>
          <h1>وكيل محلي فوق Ollama</h1>
          <p class="sub">
            ذاكرة، RAG، تخطيط، أدوات آمنة، ودعم نصوص وصور داخل واجهة واحدة.
          </p>
        </div>
        <div class="hero-actions">
          <button id="reindexBtn">إعادة فهرسة المعرفة</button>
          <select id="modeSelect" class="mode-select">
            <option value="general">عام</option>
            <option value="coder">مبرمج</option>
            <option value="vision">رؤية</option>
            <option value="manager">مدير مشروع</option>
          </select>
          <select id="permissionSelect" class="mode-select">
            <option value="none">بدون أدوات</option>
            <option value="local-read">قراءة محلية</option>
            <option value="local-write">كتابة محلية</option>
            <option value="internet-read">قراءة إنترنت</option>
            <option value="internet-download">تنزيل من الإنترنت</option>
            <option value="full">كامل</option>
          </select>
        </div>
      </section>

      <section class="layout">
        <aside class="panel side-panel">
          <h2>لوحة الحالة</h2>
          <div id="dashboard"></div>
          <h2>الإعدادات</h2>
          <div id="settingsPanel"></div>
          <h2>المحادثات</h2>
          <div id="conversationsPanel"></div>
          <h2>آخر سير عمل</h2>
          <div id="runsPanel"></div>
          <h2>القوالب</h2>
          <div id="templatesPanel"></div>
        </aside>

        <section class="panel chat-panel">
          <section class="builder-panel">
            <h2>Build Full Project</h2>
            <input id="projectNameInput" class="project-input" placeholder="اسم المشروع الاختياري">
            <input id="targetDirInput" class="project-input" placeholder="مجلد الهدف مثل generated/my-app أو /مسار/كامل">
            <label class="checkbox">
              <input type="checkbox" id="allowExternalToggle">
              السماح بمجلد خارج مساحة العمل
            </label>
            <div class="builder-actions">
              <button id="buildProjectBtn" type="button">ابن المشروع كاملاً</button>
              <button id="executeProjectBtn" type="button">ثبّت وشغّل واختبر</button>
            </div>
          </section>
          <div id="messages" class="messages"></div>
          <form id="chatForm" class="composer">
            <textarea id="messageInput" placeholder="اكتب طلبك هنا..."></textarea>
            <div class="composer-footer">
              <input type="file" id="imageInput" accept="image/*" multiple>
              <button type="submit">إرسال</button>
            </div>
          </form>
        </section>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
  </html>
