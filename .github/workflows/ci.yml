name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Syntax Check
        run: python3 -m py_compile run.py app/*.py tests/*.py

      - name: Run Tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v
